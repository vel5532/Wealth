<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Investment Tracker | Stocks, Metals, MF, Bonds, Loans</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            'sans': ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <style>
    * { transition: all 0.2s ease; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    .card-hover:hover { transform: translateY(-3px); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.15); }
    .modal-enter { animation: fadeSlideIn 0.25s ease-out; }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark ::-webkit-scrollbar-track { background: #1e293b; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

  <div id="root"></div>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="text/babel">
    // ============================================
    // INVESTMENT TRACKER - Full Stack Web App
    // Connects to Google Sheets via Apps Script
    // ============================================
    
    const { useState, useEffect } = React;
    
    // ========== CONFIGURATION ==========
    // IMPORTANT: Replace with your Google Apps Script Web App URL
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyZcvLh72sN1LvIvRIv5T3U71YcTVXi2eUPX2bkkTssRTX_TFa0Dm851siacOer4UAm/exec';
    
    // Investment Categories
    const CATEGORIES = {
      STOCK: { name: 'Stocks', icon: '📈', color: 'bg-green-500', fields: ['companyName', 'ticker', 'shares', 'buyPrice', 'currentPrice', 'sector', 'dividend'] },
      METAL: { name: 'Metals', icon: '🥇', color: 'bg-yellow-500', fields: ['metalType', 'purity', 'weight', 'purchaseRate', 'currentRate', 'certificateNo', 'storage'] },
      MUTUAL_FUND: { name: 'Mutual Funds', icon: '📊', color: 'bg-blue-500', fields: ['fundName', 'schemeCode', 'units', 'navAtPurchase', 'currentNav', 'fundCategory', 'expenseRatio'] },
      BOND: { name: 'Bonds', icon: '📜', color: 'bg-purple-500', fields: ['bondName', 'isin', 'faceValue', 'quantity', 'interestRate', 'maturityDate', 'issuer'] },
      LOAN: { name: 'Loans', icon: '🏦', color: 'bg-red-500', fields: ['loanType', 'lender', 'principalAmount', 'interestRate', 'emiAmount', 'startDate', 'endDate', 'outstandingBalance'] },
      REAL_ESTATE: { name: 'Real Estate', icon: '🏠', color: 'bg-lime-500', fields: ['propertyName', 'propertyType', 'area', 'purchaseCost', 'currentValue', 'location', 'rentalIncome'] },
      COMMODITY: { name: 'Commodities', icon: '🌾', color: 'bg-amber-700', fields: ['commodity', 'unit', 'quantity', 'purchaseRate', 'currentRate', 'storage', 'deliveryDate'] },
      INSURANCE: { name: 'Insurance', icon: '🛡️', color: 'bg-cyan-500', fields: ['policyName', 'policyNo', 'sumAssured', 'premium', 'premiumDueDate', 'maturityDate', 'nominee'] },
      OTHER: { name: 'Other', icon: '📁', color: 'bg-gray-500', fields: ['name', 'type', 'quantity', 'purchasePrice', 'currentValue', 'notes'] }
    };
    
    // Helper Functions
    const generateId = () => 'inv_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
    
    // Show toast notification
    const showToast = (message, type = 'success') => {
      const toast = document.createElement('div');
      toast.className = `fixed bottom-5 left-1/2 transform -translate-x-1/2 z-50 px-5 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2 animate-bounce`;
      toast.style.backgroundColor = type === 'success' ? '#10B981' : '#EF4444';
      toast.style.color = 'white';
      toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    };
    
    // API Call to Google Sheets
    const callGoogleScript = async (action, data = {}) => {
      try {
        const response = await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action, ...data })
        });
        return { success: true };
      } catch (error) {
        console.error('API Error:', error);
        return { success: false, error: error.message };
      }
    };
    
    // Main App Component
    const App = () => {
      const [investments, setInvestments] = useState([]);
      const [showModal, setShowModal] = useState(false);
      const [selectedCategory, setSelectedCategory] = useState('STOCK');
      const [darkMode, setDarkMode] = useState(false);
      const [formData, setFormData] = useState({});
      const [loading, setLoading] = useState(false);
      const [dashboardData, setDashboardData] = useState(null);
      const [filter, setFilter] = useState('all');
      
      // Load dark mode preference
      useEffect(() => {
        const savedDark = localStorage.getItem('dark_mode');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        setDarkMode(savedDark === 'true' || (savedDark === null && prefersDark));
      }, []);
      
      // Apply dark mode
      useEffect(() => {
        if (darkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
        localStorage.setItem('dark_mode', darkMode);
      }, [darkMode]);
      
      // Load investments from localStorage
      useEffect(() => {
        const stored = localStorage.getItem('investments');
        if (stored) {
          setInvestments(JSON.parse(stored));
        }
      }, []);
      
      // Save to localStorage
      useEffect(() => {
        localStorage.setItem('investments', JSON.stringify(investments));
      }, [investments]);
      
      // Add investment
      const addInvestment = async () => {
        const category = CATEGORIES[selectedCategory];
        if (!formData.name && !formData.companyName && !formData.fundName && !formData.propertyName && !formData.policyName && !formData.bondName && !formData.loanType) {
          showToast('Please enter a name for this investment', 'error');
          return;
        }
        
        const newInvestment = {
          id: generateId(),
          category: selectedCategory,
          subCategory: category.name,
          data: { ...formData, investmentDate: new Date().toISOString().split('T')[0], status: 'Active' }
        };
        
        setInvestments(prev => [...prev, newInvestment]);
        
        // Sync to Google Sheets
        await callGoogleScript('addInvestment', { investment: newInvestment });
        
        setShowModal(false);
        setFormData({});
        showToast(`Added to ${category.name} successfully!`);
      };
      
      // Delete investment
      const deleteInvestment = async (id, category) => {
        if (confirm('Delete this investment?')) {
          setInvestments(prev => prev.filter(inv => inv.id !== id));
          await callGoogleScript('deleteInvestment', { id, category });
          showToast('Investment deleted');
        }
      };
      
      // Calculate total portfolio value
      const calculateTotals = () => {
        let totalInvestment = 0;
        let totalCurrent = 0;
        
        investments.forEach(inv => {
          const qty = inv.data.quantity || inv.data.shares || inv.data.units || 1;
          const purchasePrice = inv.data.purchasePrice || inv.data.buyPrice || inv.data.navAtPurchase || inv.data.purchaseCost || 0;
          const currentPrice = inv.data.currentValue || inv.data.currentPrice || inv.data.currentNav || purchasePrice;
          
          totalInvestment += qty * purchasePrice;
          totalCurrent += qty * currentPrice;
        });
        
        return { totalInvestment, totalCurrent, totalReturns: totalCurrent - totalInvestment };
      };
      
      const totals = calculateTotals();
      const returnsPercent = totals.totalInvestment > 0 ? (totals.totalReturns / totals.totalInvestment * 100).toFixed(2) : 0;
      
      // Filter investments
      const filteredInvestments = filter === 'all' 
        ? investments 
        : investments.filter(inv => inv.category === filter);
      
      // Group by category for display
      const groupedInvestments = filteredInvestments.reduce((acc, inv) => {
        const cat = inv.category;
        if (!acc[cat]) acc[cat] = [];
        acc[cat].push(inv);
        return acc;
      }, {});
      
      // Render form fields based on category
      const renderFormFields = () => {
        const category = CATEGORIES[selectedCategory];
        const fields = category.fields;
        
        const fieldLabels = {
          companyName: 'Company Name', ticker: 'Ticker Symbol', shares: 'Number of Shares',
          buyPrice: 'Buy Price (₹)', currentPrice: 'Current Price (₹)', sector: 'Sector',
          dividend: 'Dividend Yield (%)', metalType: 'Metal Type', purity: 'Purity (karat)',
          weight: 'Weight (grams)', purchaseRate: 'Purchase Rate (₹/g)', currentRate: 'Current Rate (₹/g)',
          certificateNo: 'Certificate No.', storage: 'Storage Location', fundName: 'Fund Name',
          schemeCode: 'Scheme Code', units: 'Number of Units', navAtPurchase: 'NAV at Purchase (₹)',
          currentNav: 'Current NAV (₹)', fundCategory: 'Fund Category', expenseRatio: 'Expense Ratio (%)',
          bondName: 'Bond Name', isin: 'ISIN Code', faceValue: 'Face Value (₹)', quantity: 'Quantity',
          interestRate: 'Interest Rate (%)', maturityDate: 'Maturity Date', issuer: 'Issuer',
          loanType: 'Loan Type', lender: 'Lender/Bank', principalAmount: 'Principal Amount (₹)',
          emiAmount: 'EMI Amount (₹)', startDate: 'Start Date', endDate: 'End Date',
          outstandingBalance: 'Outstanding Balance (₹)', propertyName: 'Property Name',
          propertyType: 'Property Type', area: 'Area (sq ft)', purchaseCost: 'Purchase Cost (₹)',
          currentValue: 'Current Value (₹)', location: 'Location', rentalIncome: 'Monthly Rental Income (₹)',
          commodity: 'Commodity Name', unit: 'Unit (kg/g/oz)', policyName: 'Policy Name',
          policyNo: 'Policy Number', sumAssured: 'Sum Assured (₹)', premium: 'Premium Amount (₹)',
          premiumDueDate: 'Premium Due Date', nominee: 'Nominee Name', name: 'Investment Name',
          type: 'Investment Type', notes: 'Notes'
        };
        
        return (
          <div className="space-y-3 max-h-96 overflow-y-auto p-1">
            {fields.map(field => (
              <div key={field}>
                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                  {fieldLabels[field] || field.replace(/([A-Z])/g, ' $1').trim()}
                </label>
                <input
                  type={field.includes('Date') ? 'date' : (field.includes('Rate') || field.includes('Price') || field.includes('Amount') || field.includes('Value') || field.includes('Premium') || field.includes('EMI') ? 'number' : 'text')}
                  value={formData[field] || ''}
                  onChange={(e) => setFormData({ ...formData, [field]: e.target.value })}
                  className="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 outline-none"
                  placeholder={`Enter ${fieldLabels[field] || field}`}
                />
              </div>
            ))}
          </div>
        );
      };
      
      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="bg-white dark:bg-gray-800 shadow-md sticky top-0 z-20 border-b border-gray-200 dark:border-gray-700">
            <div className="max-w-7xl mx-auto px-4 py-4 flex flex-wrap justify-between items-center gap-3">
              <div className="flex items-center gap-3">
                <div className="bg-gradient-to-br from-blue-500 to-indigo-600 p-2.5 rounded-xl">
                  <i className="fas fa-chart-line text-white text-xl"></i>
                </div>
                <div>
                  <h1 className="text-2xl font-bold">Investment Tracker</h1>
                  <p className="text-xs text-gray-500 dark:text-gray-400">Stocks | Metals | MF | Bonds | Loans</p>
                </div>
              </div>
              <div className="flex items-center gap-3">
                <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-full bg-gray-100 dark:bg-gray-700">
                  <i className={`fas ${darkMode ? 'fa-sun' : 'fa-moon'} text-gray-600 dark:text-gray-300`}></i>
                </button>
                <button onClick={() => { setShowModal(true); setFormData({}); }} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl flex items-center gap-2 font-semibold">
                  <i className="fas fa-plus-circle"></i> Add Investment
                </button>
              </div>
            </div>
          </header>
          
          <main className="max-w-7xl mx-auto px-4 py-8">
            {/* Portfolio Summary Cards */}
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
              <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border-l-4 border-blue-500">
                <p className="text-gray-500 dark:text-gray-400 text-sm">Total Investment</p>
                <p className="text-2xl font-bold">₹{totals.totalInvestment.toLocaleString()}</p>
              </div>
              <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border-l-4 border-green-500">
                <p className="text-gray-500 dark:text-gray-400 text-sm">Current Value</p>
                <p className="text-2xl font-bold">₹{totals.totalCurrent.toLocaleString()}</p>
              </div>
              <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border-l-4 border-purple-500">
                <p className="text-gray-500 dark:text-gray-400 text-sm">Total Returns</p>
                <p className={`text-2xl font-bold ${totals.totalReturns >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                  ₹{totals.totalReturns.toLocaleString()}
                </p>
              </div>
              <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border-l-4 border-orange-500">
                <p className="text-gray-500 dark:text-gray-400 text-sm">Returns %</p>
                <p className={`text-2xl font-bold ${totals.totalReturns >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                  {returnsPercent}%
                </p>
              </div>
            </div>
            
            {/* Category Filter */}
            <div className="flex flex-wrap gap-2 mb-6">
              <button onClick={() => setFilter('all')} className={`px-4 py-2 rounded-lg font-medium ${filter === 'all' ? 'bg-blue-500 text-white' : 'bg-gray-200 dark:bg-gray-700'}`}>All</button>
              {Object.entries(CATEGORIES).map(([key, cat]) => (
                <button key={key} onClick={() => setFilter(key)} className={`px-4 py-2 rounded-lg font-medium flex items-center gap-2 ${filter === key ? 'bg-blue-500 text-white' : 'bg-gray-200 dark:bg-gray-700'}`}>
                  <span>{cat.icon}</span> {cat.name}
                </button>
              ))}
            </div>
            
            {/* Investments Display */}
            {Object.keys(groupedInvestments).length === 0 ? (
              <div className="text-center py-16">
                <div className="bg-white dark:bg-gray-800 rounded-2xl p-8 max-w-md mx-auto">
                  <i className="fas fa-folder-open text-5xl text-gray-400 mb-4"></i>
                  <h3 className="text-xl font-bold mb-2">No Investments Yet</h3>
                  <p className="text-gray-500 mb-6">Add your first investment to start tracking</p>
                  <button onClick={() => setShowModal(true)} className="bg-blue-500 text-white px-6 py-2 rounded-xl">Add Investment</button>
                </div>
              </div>
            ) : (
              Object.entries(groupedInvestments).map(([category, items]) => (
                <div key={category} className="mb-8">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2">
                    <span>{CATEGORIES[category]?.icon}</span> {CATEGORIES[category]?.name}
                    <span className="text-sm text-gray-500">({items.length})</span>
                  </h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                    {items.map(inv => {
                      const qty = inv.data.quantity || inv.data.shares || inv.data.units || 1;
                      const purchasePrice = inv.data.purchasePrice || inv.data.buyPrice || inv.data.navAtPurchase || inv.data.purchaseCost || 0;
                      const currentPrice = inv.data.currentValue || inv.data.currentPrice || inv.data.currentNav || purchasePrice;
                      const totalInvestment = qty * purchasePrice;
                      const totalCurrent = qty * currentPrice;
                      const returns = totalCurrent - totalInvestment;
                      const returnsPct = totalInvestment > 0 ? (returns / totalInvestment * 100).toFixed(2) : 0;
                      
                      return (
                        <div key={inv.id} className="bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden card-hover">
                          <div className={`h-2 ${CATEGORIES[category]?.color}`}></div>
                          <div className="p-5">
                            <div className="flex justify-between items-start mb-3">
                              <h3 className="font-bold text-lg">
                                {inv.data.name || inv.data.companyName || inv.data.fundName || inv.data.propertyName || inv.data.policyName || inv.data.bondName || inv.data.loanType}
                              </h3>
                              <button onClick={() => deleteInvestment(inv.id, category)} className="text-red-500 hover:text-red-700">
                                <i className="fas fa-trash-alt"></i>
                              </button>
                            </div>
                            <div className="space-y-2 text-sm">
                              <div className="flex justify-between">
                                <span className="text-gray-500">Quantity:</span>
                                <span className="font-medium">{qty}</span>
                              </div>
                              <div className="flex justify-between">
                                <span className="text-gray-500">Investment:</span>
                                <span>₹{totalInvestment.toLocaleString()}</span>
                              </div>
                              <div className="flex justify-between">
                                <span className="text-gray-500">Current Value:</span>
                                <span>₹{totalCurrent.toLocaleString()}</span>
                              </div>
                              <div className="flex justify-between">
                                <span className="text-gray-500">Returns:</span>
                                <span className={returns >= 0 ? 'text-green-600' : 'text-red-600'}>
                                  {returns >= 0 ? '+' : ''}{returnsPct}%
                                </span>
                              </div>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))
            )}
          </main>
          
          {/* Add Investment Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onClick={() => setShowModal(false)}>
              <div className="bg-white dark:bg-gray-800 rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto modal-enter" onClick={e => e.stopPropagation()}>
                <div className="p-6">
                  <div className="flex justify-between items-center mb-5">
                    <h2 className="text-2xl font-bold">Add New Investment</h2>
                    <button onClick={() => setShowModal(false)} className="text-gray-400 text-2xl">&times;</button>
                  </div>
                  
                  <div className="mb-5">
                    <label className="block text-sm font-medium mb-2">Select Category</label>
                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                      {Object.entries(CATEGORIES).map(([key, cat]) => (
                        <button
                          key={key}
                          onClick={() => setSelectedCategory(key)}
                          className={`px-3 py-2 rounded-lg flex items-center gap-2 justify-center transition ${selectedCategory === key ? `${cat.color} text-white` : 'bg-gray-100 dark:bg-gray-700'}`}
                        >
                          <span>{cat.icon}</span> {cat.name}
                        </button>
                      ))}
                    </div>
                  </div>
                  
                  <form onSubmit={(e) => { e.preventDefault(); addInvestment(); }}>
                    {renderFormFields()}
                    
                    <div className="flex gap-3 mt-6">
                      <button type="button" onClick={() => setShowModal(false)} className="flex-1 px-4 py-2 border rounded-lg">Cancel</button>
                      <button type="submit" className="flex-1 px-4 py-2 bg-blue-500 text-white rounded-lg font-semibold">Add Investment</button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };
    
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
